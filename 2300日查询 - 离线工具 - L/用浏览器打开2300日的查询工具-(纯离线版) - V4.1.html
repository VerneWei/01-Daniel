      const [isModalOpen, setIsModalOpen] = useState(false);
      const [activeDateInfo, setActiveDateInfo] = useState(null);
      const [editForm, setEditForm] = useState({ title: '', desc: '', source: '', url: '', type: 'note' });

      const formatYearStr = (y) => {
          if (y === 0) return "1 AD";
          return y < 0 ? `${Math.abs(y)} BC` : `${y} AD`;
      };

      const handleExtendPast = (years) => {
          if (!years || years <= 0) return;
          const newStart = startYear - years;
          setStartYear(newStart);
          setTimeout(() => jumpToYear(newStart), 100);
      };

      const handleShrinkPast = (years) => {
          if (!years || years <= 0) return;
          let newStart = startYear + years;
          if (newStart > -457) {
              setDialog({ isOpen: true, type: 'alert', message: t.errLockPast });
              return;
          }
          if (newStart >= endYear) {
              setDialog({ isOpen: true, type: 'alert', message: t.errLockPast });
              return;
          }
          setDialog({
             isOpen: true, type: 'confirm', 
             message: t.confirmDeletePast.replace('{y}', years).replace('{year}', formatYearStr(newStart)),
             onConfirm: () => setStartYear(newStart)
          });
      };

      const handleExtendFuture = (years) => {
          if (!years || years <= 0) return;
          const newEnd = endYear + years;
          setEndYear(newEnd);
          setTimeout(() => jumpToYear(newEnd), 100);
      };

      const handleShrinkFuture = (years) => {
          if (!years || years <= 0) return;
          let newEnd = endYear - years;
          if (newEnd < 1845) {
              setDialog({ isOpen: true, type: 'alert', message: t.errLockFuture });
              return;
          }
          if (newEnd <= startYear) {
              setDialog({ isOpen: true, type: 'alert', message: t.errLockFuture });
              return;
          }
          setDialog({
             isOpen: true, type: 'confirm', 
             message: t.confirmDeleteFuture.replace('{y}', years).replace('{year}', formatYearStr(newEnd)),
             onConfirm: () => setEndYear(newEnd)
          });
      };

      const handleResetTimeline = () => {
          setDialog({
             isOpen: true, type: 'confirm', 
             message: "⚠️ " + t.resetDefault,
             onConfirm: () => { setStartYear(-457); setEndYear(2031); }
          });
      };

      const baseCalendarData = useMemo(() => {
        let data = [];
        for (let y = startYear; y <= endYear; y++) {
          if (y === 0) continue; 
          const jewishYear = y < 0 ? y + 3762 : y + 3760;
          const cycleYear = jewishYear % 19;
          const isLeapYear = [3, 6, 8, 11, 14, 17, 0].includes(cycleYear);
          const yearStr = y < 0 ? `${Math.abs(y)} BC` : `${y} AD`;

          let currentGDate = new Date();
          currentGDate.setHours(0, 0, 0, 0);

          if (historicalOverrides[y]) {
            // 【重点修复】：之前因为 day 缺失，导致这里获取到的公历日期是 NaN (Invalid Date)
            currentGDate.setFullYear(y, historicalOverrides[y].month, historicalOverrides[y].day);
          } else {
            currentGDate.setFullYear(y, 2, 21);
            currentGDate.setDate(currentGDate.getDate() + metonicOffsets[cycleYear]);
          }

          const getMonthNameIndex = (idx, isLeap) => {
            if(idx < 11) return idx;
            if(isLeap && idx === 11) return 11;
            if(isLeap && idx === 12) return 12;
            return 13;
          };

          const months = [];
          for(let i=0; i<11; i++){
             months.push({ r: i+1, c: (i+6)%12+1, nameIndex: getMonthNameIndex(i, isLeapYear), days: [30,29,30,29,30,29,30,29,30,29,30][i] });
          }
          if (isLeapYear) {
            months.push({ r: 12, c: 6, nameIndex: getMonthNameIndex(11, true), days: 30, isLeap: true });
            months.push({ r: 13, c: "6+", nameIndex: getMonthNameIndex(12, true), days: 29, isLeap: true });
          } else {
            months.push({ r: 12, c: 6, nameIndex: getMonthNameIndex(11, false), days: 29 });
          }

          months.forEach((m, idx) => {
            let daysData = [];
            for (let d = 1; d <= m.days; d++) {
              daysData.push({
                year: y, relMonth: m.r, day: d, 
                gregMonth: currentGDate.getMonth() + 1,
                gregDay: currentGDate.getDate(),
                dowIdx: currentGDate.getDay()
              });
              currentGDate.setDate(currentGDate.getDate() + 1);
            }
            data.push({
              year: y, yearStr: idx === 0 ? yearStr : "",
              jewishYearDisplay: idx === 0 ? jewishYear : "",
              isFirstOfMonth: idx === 0,
              baseDaysData: daysData,
              ...m,
            });
          });
        }
        return data;
      }, [startYear, endYear]);

      const baseYearsData = useMemo(() => {
        const yData = [];
        let curYear = null;
        baseCalendarData.forEach(month => {
            if (!curYear || curYear.year !== month.year) {
                if (curYear) yData.push(curYear);
                curYear = { year: month.year, yearStr: month.yearStr || (month.year < 0 ? `${Math.abs(month.year)} BC` : `${month.year} AD`), jewishYearDisplay: month.jewishYearDisplay, months: [] };
            }
            curYear.months.push(month);
        });
        if (curYear) yData.push(curYear);
        return yData;
      }, [baseCalendarData]);

      const yearGroupRows = useMemo(() => {
        const chunks = [];
        for (let i = 0; i < baseYearsData.length; i += yearGroup) {
            const chunkYears = baseYearsData.slice(i, i + yearGroup);
            chunks.push({
                startYear: chunkYears[0].year, endYear: chunkYears[chunkYears.length - 1].year,
                startYearStr: chunkYears[0].yearStr, endYearStr: chunkYears[chunkYears.length - 1].yearStr || (chunkYears[chunkYears.length - 1].year < 0 ? `${Math.abs(chunkYears[chunkYears.length - 1].year)} BC` : `${chunkYears[chunkYears.length - 1].year} AD`),
                years: chunkYears
            });
        }
        const rows = [];
        for (let i = 0; i < chunks.length; i += 10) {
            const rowChunks = chunks.slice(i, i + 10);
            rows.push({
                startYear: rowChunks[0].startYear, endYear: rowChunks[rowChunks.length - 1].endYear,
                startYearStr: rowChunks[0].startYearStr, endYearStr: rowChunks[rowChunks.length - 1].endYearStr,
                chunks: rowChunks
            });
        }
        return rows;
      }, [baseYearsData, yearGroup]);

      const listToRender = useMemo(() => {
          if (viewMode === 'day') return baseCalendarData.map((item, idx) => ({ ...item, absoluteIndex: idx }));
          if (viewMode === 'month') return baseYearsData.map((item, idx) => ({ ...item, absoluteIndex: idx }));
          return yearGroupRows.map((item, idx) => ({ ...item, absoluteIndex: idx }));
      }, [viewMode, baseCalendarData, baseYearsData, yearGroupRows]);

      // 调整了各级视图的行高，以容纳放大后的超大字体及新增的提示条高度
      const rowHeight = viewMode === 'day' ? 250 : viewMode === 'month' ? 350 : 290;
      const totalHeight = listToRender.length * rowHeight;
      const handleScroll = (e) => window.requestAnimationFrame(() => setScrollTop(e.target.scrollTop));

      const startIndex = Math.max(0, Math.floor(scrollTop / rowHeight) - VISIBLE_ROWS);
      const endIndex = Math.min(listToRender.length - 1, Math.floor((scrollTop + (containerRef.current?.clientHeight || 800)) / rowHeight) + VISIBLE_ROWS);

      const visibleData = listToRender.slice(startIndex, endIndex + 1).map(baseItem => {
          if (viewMode === 'day') {
              let monthHasEvent = false;
              const daysData = baseItem.baseDaysData.map(dInfo => {
                  const ev = userEvents[`${dInfo.year}-${dInfo.relMonth}-${dInfo.day}`];
                  if (ev) monthHasEvent = true;
                  return { ...dInfo, event: ev };
              });
              return { ...baseItem, daysData, monthHasEvent };
          } else if (viewMode === 'month') {
              const monthsData = baseItem.months.map(m => {
                  const mEvs = m.baseDaysData.map(d => userEvents[`${d.year}-${d.relMonth}-${d.day}`]).filter(Boolean);
                  return { ...m, events: mEvs };
              });
              const allYearEvents = monthsData.flatMap(m => m.events);
              return { ...baseItem, monthsData, hasEvent: allYearEvents.length > 0, allEvents: allYearEvents };
          } else {
              const chunksData = baseItem.chunks.map(chunk => {
                  const chunkEvents = chunk.years.flatMap(y => y.months.flatMap(m => m.baseDaysData.map(d => userEvents[`${d.year}-${d.relMonth}-${d.day}`]).filter(Boolean)));
                  return { ...chunk, events: chunkEvents };
              });
              const allRowEvents = chunksData.flatMap(c => c.events);
              return { ...baseItem, chunksData, hasEvent: allRowEvents.length > 0, allEvents: allRowEvents };
          }
      });

      const jumpToYear = useCallback((targetYear) => {
        let y = parseInt(targetYear, 10);
        if (isNaN(y) || y === 0) return;
        if (y < startYear) y = startYear;
        if (y > endYear) y = endYear;
        const targetIdx = listToRender.findIndex(item => {
            if (viewMode === 'day') return item.year === y;
            if (viewMode === 'month') return item.year === y;
            if (viewMode === 'year') return y >= item.startYear && y <= item.endYear;
            return false;
        });
        if (targetIdx !== -1 && containerRef.current) { containerRef.current.scrollTop = targetIdx * rowHeight; setInputYear(y); }
      }, [listToRender, viewMode, rowHeight, startYear, endYear]);

      const handleZoomToYear = (y) => { 
        if (viewMode === 'year') {
            if (yearGroup === 500) setYearGroup(100);
            else if (yearGroup === 100) setYearGroup(50);
            else if (yearGroup === 50) setYearGroup(10);
            else if (yearGroup === 10) setYearGroup(5);
            else if (yearGroup === 5) setYearGroup(1);
            else setViewMode('month'); // 1年跨度点击后，继续下钻进入月视图
        } else if (viewMode === 'month') {
            setViewMode('day'); // 月视图点击后，继续下钻进入日视图
        } else {
            setViewMode('day');
        }
        setPendingJumpYear(y); 
      };
      useEffect(() => { if (pendingJumpYear !== null) { jumpToYear(pendingJumpYear); setPendingJumpYear(null); } }, [listToRender, pendingJumpYear, jumpToYear]);
      const handleManualInput = (e) => { e.preventDefault(); jumpToYear(inputYear); };

      const openEditor = (dInfo) => {
        setActiveDateInfo(dInfo);
        if (dInfo.event) setEditForm(dInfo.event); else setEditForm({ title: '', desc: '', source: '', url: '', type: 'note' });
        setIsModalOpen(true);
      };

      const saveEvent = () => {
        if (!editForm.title.trim()) { setDialog({ isOpen: true, type: 'alert', message: "标题不能为空！" }); return; }
        const eventKey = `${activeDateInfo.year}-${activeDateInfo.relMonth}-${activeDateInfo.day}`;
        setUserEvents(prev => ({ ...prev, [eventKey]: { ...editForm } }));
        setIsModalOpen(false);
      };

      const deleteEvent = () => {
        const eventKey = `${activeDateInfo.year}-${activeDateInfo.relMonth}-${activeDateInfo.day}`;
        setUserEvents(prev => { const newState = { ...prev }; delete newState[eventKey]; return newState; });
        setIsModalOpen(false);
      };

      const bWidth = `${themeBorderWidth}px`;

      function getEventStyle(event) {
        if (!event) return { backgroundColor: "transparent", borderColor: theme.borderMain, borderWidth: bWidth };
        if (event.type === 'crucial') return { backgroundColor: theme.crucialBg, borderColor: theme.crucialBorder, borderWidth: bWidth, color: theme.crucialText, zIndex: 10, transform: 'scale(1.08)' };
        if (event.type === 'start') return { backgroundColor: theme.startBg, borderColor: theme.startBorder, borderWidth: bWidth, color: theme.startText, zIndex: 10, transform: 'scale(1.08)' };
        if (event.type === 'note') return { backgroundColor: theme.noteBg, borderColor: theme.noteBorder, borderWidth: bWidth, color: theme.noteText, zIndex: 10, transform: 'scale(1.08)' };
        return { backgroundColor: theme.mileBg, borderColor: theme.mileBorder, borderWidth: bWidth, color: theme.mileText, zIndex: 10, transform: 'scale(1.05)' };
      }

      function getHighestStyle(events) {
        if (!events || events.length === 0) return { backgroundColor: "transparent", borderColor: theme.borderMain, borderWidth: bWidth, color: theme.textSub };
        const priority = { crucial: 4, start: 3, milestone: 2, note: 1 };
        const highestEvent = events.reduce((prev, current) => (priority[current.type] || 0) > (priority[prev.type] || 0) ? current : prev, events[0]);

        if (highestEvent.type === 'crucial') return { backgroundColor: theme.crucialBg, borderColor: theme.crucialBorder, borderWidth: bWidth, color: theme.crucialText };
        if (highestEvent.type === 'start') return { backgroundColor: theme.startBg, borderColor: theme.startBorder, borderWidth: bWidth, color: theme.startText };
        if (highestEvent.type === 'note') return { backgroundColor: theme.noteBg, borderColor: theme.noteBorder, borderWidth: bWidth, color: theme.noteText };
        return { backgroundColor: theme.mileBg, borderColor: theme.mileBorder, borderWidth: bWidth, color: theme.mileText };
      }

      const renderSidebarEvents = (events) => {
          if (events.length === 0) return <div className="text-[10px] text-center italic font-serif" style={{ color: theme.textSub, opacity: 0.6 }}>{t.noRecord}</div>;
          const displayEvents = events.slice(0, 4); 
          return (
              <div className="space-y-2">
                  {displayEvents.map((ev, idx) => {
                      const evtStyle = getHighestStyle([ev]);
                      return (
                          <div key={idx} className="pl-2.5 relative group" style={{ borderLeftWidth: Math.max(2, themeBorderWidth)+'px', borderLeftColor: evtStyle.borderColor, borderStyle: 'solid' }}>
                              <div className="text-xs font-bold font-serif line-clamp-1 mb-0.5" style={{ color: evtStyle.color }}>{ev.title}</div>
                              <div className="text-[10px] line-clamp-1 leading-tight" title={ev.desc} style={{ color: theme.textSub }}>{ev.desc}</div>
                          </div>
                      )
                  })}
                  {events.length > 4 && <div className="text-[9px] italic mt-1" style={{ color: theme.textSub }}>{t.etcRecords.replace('{n}', events.length)}</div>}
              </div>
          )
      };

      const bgStyles = {
        backgroundColor: theme.bgApp, 
        color: theme.textMain, 
        backgroundImage: themeBgImage ? `url(${themeBgImage})` : 'none', 
        backgroundSize: 'cover', 
        backgroundPosition: 'center', 
        backgroundAttachment: 'fixed', 
        backgroundRepeat: 'no-repeat'
      };

      return (
        <div className="flex flex-col h-screen font-sans overflow-x-auto overflow-y-hidden custom-scrollbar transition-colors duration-300 relative" style={bgStyles}>
          {/* 【修复】全局水平防挤压包裹层，保证最小宽度，自然产生滚动条 */}
          <div className="flex flex-col h-full min-w-max w-full">
          
          {/* === 全局自定义安全对话框 === */}
          {dialog.isOpen && (
             <div className="fixed inset-0 bg-black/50 z-[200] flex items-center justify-center p-4 backdrop-blur-sm transition-all">
                <div className="bg-[#fdfaf3] border border-[#e5d5b7] p-6 rounded-xl shadow-2xl w-full max-w-sm">
                   <div className="font-bold text-stone-800 mb-6 whitespace-pre-wrap leading-relaxed">
                       {dialog.message}
                   </div>
                   <div className="flex justify-end gap-3">
                       {dialog.type === 'confirm' && (
                           <button onClick={() => setDialog({ isOpen: false })} className="px-5 py-2 bg-stone-100 hover:bg-stone-200 text-stone-700 rounded transition-colors font-medium border border-[#e5d5b7]">
                               {t.btnCancel}
                           </button>
                       )}
                       <button onClick={() => { if (dialog.onConfirm) dialog.onConfirm(); setDialog({ isOpen: false }); }} className={`px-5 py-2 rounded transition-colors font-bold shadow text-white ${dialog.type === 'confirm' ? 'bg-amber-600 hover:bg-amber-700' : 'bg-blue-600 hover:bg-blue-700'}`}>
                           {dialog.type === 'confirm' ? t.btnConfirm : t.btnOK}
                       </button>
                   </div>
                </div>
             </div>
          )}

          {/* === 模态框：编辑事件 === */}
          {isModalOpen && activeDateInfo && (
            <div className="fixed inset-0 bg-black/40 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
              <div className="bg-[#fdfaf3] border border-[#e5d5b7] p-6 rounded-xl shadow-2xl w-full max-w-md transform transition-all">
                <div className="flex justify-between items-center mb-4 border-b pb-2 border-[#e5d5b7]">
                  <h3 className="font-bold text-lg font-serif text-amber-900">{t.editModalTitle}</h3>
                  <button onClick={() => setIsModalOpen(false)} className="text-gray-400 hover:text-red-500 font-bold">✕</button>
                </div>
                <div className="text-xs mb-4 p-2 bg-amber-50 rounded border border-amber-200 text-amber-800 font-mono flex justify-between">
                  <span>{t.jewishEra}: {activeDateInfo.year < 0 ? Math.abs(activeDateInfo.year)+' BC' : activeDateInfo.year+' AD'} - {t.relMonth}{activeDateInfo.relMonth}{t.monthLabel} {t.civMonth}{activeDateInfo.day}</span>
                  <span>{activeDateInfo.gregMonth}/{activeDateInfo.gregDay} ({t.weekdays[activeDateInfo.dowIdx]})</span>
                </div>
                <div className="space-y-3">
                  <div>
                    <label className="block text-xs font-bold text-stone-700 mb-1">{t.evtTitle}</label>
                    <input type="text" value={editForm.title} onChange={e => setEditForm({...editForm, title: e.target.value})} className="w-full p-2 border border-[#d6c7ab] rounded bg-white text-sm outline-none focus:border-amber-500" />
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-stone-700 mb-1">{t.evtDesc}</label>
                    <textarea value={editForm.desc} onChange={e => setEditForm({...editForm, desc: e.target.value})} className="w-full p-2 border border-[#d6c7ab] rounded bg-white text-sm outline-none focus:border-amber-500 h-20 resize-none" />
                  </div>
                  <div className="flex gap-2">
                    <div className="flex-1">
                      <label className="block text-xs font-bold text-stone-700 mb-1">{t.evtSource}</label>
                      <input type="text" value={editForm.source} onChange={e => setEditForm({...editForm, source: e.target.value})} className="w-full p-2 border border-[#d6c7ab] rounded bg-white text-sm outline-none focus:border-amber-500" />
                    </div>
                    <div className="w-1/3">
                      <label className="block text-xs font-bold text-stone-700 mb-1">{t.evtType}</label>
                      <select value={editForm.type} onChange={e => setEditForm({...editForm, type: e.target.value})} className="w-full p-2 border border-[#d6c7ab] rounded bg-white text-sm outline-none focus:border-amber-500">
                        <option value="note">{t.typeNote}</option>
                        <option value="crucial">{t.typeCrucial}</option>
                        <option value="start">{t.typeStart}</option>
                        <option value="milestone">{t.typeMile}</option>
                      </select>
                    </div>
                  </div>
                  <div>
                    <label className="block text-xs font-bold text-stone-700 mb-1">{t.evtUrl}</label>
                    <input type="text" value={editForm.url} onChange={e => setEditForm({...editForm, url: e.target.value})} className="w-full p-2 border border-[#d6c7ab] rounded bg-white text-sm outline-none focus:border-amber-500 font-mono" />
                  </div>
                </div>
                <div className="flex justify-between mt-6 pt-4 border-t border-[#e5d5b7]">
                  <button onClick={deleteEvent} className="px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded transition-colors disabled:opacity-50" disabled={!activeDateInfo.event}>
                    {t.btnDelete}
                  </button>
                  <div className="flex gap-2">
                    <button onClick={() => setIsModalOpen(false)} className="px-4 py-2 text-sm text-stone-600 hover:bg-stone-100 rounded transition-colors">{t.btnCancel}</button>
                    <button onClick={saveEvent} className="px-6 py-2 text-sm bg-amber-700 hover:bg-amber-800 text-white rounded font-bold shadow transition-colors">{t.btnSave}</button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* === 模态框：扩展与删除时间轴范围 === */}
          {isExtendOpen && (
            <div className="absolute right-12 top-20 w-[340px] bg-white p-5 rounded-lg shadow-2xl z-50 border max-h-[85vh] overflow-y-auto" style={{ borderColor: theme.borderMain }}>
              <div className="flex justify-between items-center mb-4 pb-2 border-b" style={{ borderColor: theme.borderMain }}>
                <h3 className="font-bold text-lg text-stone-800">{t.extendTitle}</h3>
                <button onClick={() => setIsExtendOpen(false)} className="text-gray-400 hover:text-red-500 font-bold">✕</button>
              </div>
              <div className="text-xs text-stone-600 mb-4 bg-stone-50 p-2.5 rounded border flex flex-col gap-1" style={{ borderColor: theme.borderMain }}>
                <span><strong>{t.startPoint}：</strong>{formatYearStr(startYear)}</span>
                <span><strong>{t.endPoint}：</strong>{formatYearStr(endYear)}</span>
              </div>
              <div className="space-y-5">
                <div className="p-3 border rounded bg-amber-50/30" style={{ borderColor: theme.borderMain }}>
                  <label className="block text-sm font-bold mb-3" style={{ color: theme.startText }}>{t.extendPast}</label>
                  <div className="mb-3">
                    <div className="text-[10px] text-stone-500 mb-1">{t.extAddPast}</div>
                    <div className="flex gap-1.5 mb-1.5">
                      <button onClick={() => handleExtendPast(1)} className="flex-1 py-1 rounded border text-xs bg-white hover:bg-stone-50">+1 {t.yearLabel}</button>
                      <button onClick={() => handleExtendPast(10)} className="flex-1 py-1 rounded border text-xs bg-white hover:bg-stone-50">+10 {t.yearLabel}</button>
                    </div>
                  </div>
                  <div className="mb-3 pt-3 border-t border-dashed" style={{ borderColor: theme.borderMain }}>
                    <div className="text-[10px] text-red-500 mb-1 font-bold">{t.extDelPast}</div>
                    <div className="flex gap-1.5 mb-1.5">
                      <button onClick={() => handleShrinkPast(1)} className="flex-1 py-1 rounded border text-xs text-red-600 border-red-200 bg-red-50 hover:bg-red-100">-1 {t.yearLabel}</button>
                      <button onClick={() => handleShrinkPast(10)} className="flex-1 py-1 rounded border text-xs text-red-600 border-red-200 bg-red-50 hover:bg-red-100">-10 {t.yearLabel}</button>
                    </div>
                  </div>
                  <div className="flex gap-2 pt-2 border-t" style={{ borderColor: theme.borderMain }}>
                    <input type="number" min="1" value={customPastYears} onChange={e => setCustomPastYears(Math.abs(Number(e.target.value)))} className="w-16 px-2 py-1 border rounded text-xs outline-none" style={{ borderColor: theme.borderMain }} />
                    <button onClick={() => handleExtendPast(customPastYears)} className="flex-1 py-1 rounded border text-xs bg-white font-medium text-stone-700">{t.btnExtend}</button>
                    <button onClick={() => handleShrinkPast(customPastYears)} className="flex-1 py-1 rounded border border-red-300 bg-red-50 text-xs text-red-600 font-medium">{t.btnShrink}</button>
                  </div>
                </div>

                <div className="p-3 border rounded bg-blue-50/30" style={{ borderColor: theme.borderMain }}>
                  <label className="block text-sm font-bold mb-3" style={{ color: theme.mileText }}>{t.extendFuture}</label>
                  <div className="mb-3">
                    <div className="text-[10px] text-stone-500 mb-1">{t.extAddFuture}</div>
                    <div className="flex gap-1.5 mb-1.5">
                      <button onClick={() => handleExtendFuture(1)} className="flex-1 py-1 rounded border text-xs bg-white hover:bg-stone-50">+1 {t.yearLabel}</button>
                      <button onClick={() => handleExtendFuture(10)} className="flex-1 py-1 rounded border text-xs bg-white hover:bg-stone-50">+10 {t.yearLabel}</button>
                    </div>
                  </div>
                  <div className="mb-3 pt-3 border-t border-dashed" style={{ borderColor: theme.borderMain }}>
                    <div className="text-[10px] text-red-500 mb-1 font-bold">{t.extDelFuture}</div>
                    <div className="flex gap-1.5 mb-1.5">
                      <button onClick={() => handleShrinkFuture(1)} className="flex-1 py-1 rounded border text-xs text-red-600 border-red-200 bg-red-50 hover:bg-red-100">-1 {t.yearLabel}</button>

              {visibleData.map((item) => (
                <div key={item.absoluteIndex} className={`absolute w-full flex items-stretch transition-colors hover:bg-black/10`} style={{ height: `${rowHeight}px`, top: `${item.absoluteIndex * rowHeight}px`, borderColor: theme.borderMain, borderBottomWidth: bWidth, borderTopWidth: item.isFirstOfMonth ? bWidth : 0, borderTopColor: theme.startText, borderStyle: 'solid', backgroundColor: item.hasEvent || item.monthHasEvent ? theme.bgHeader : 'transparent' }}>

                      <span className="font-extrabold text-xl tracking-tight font-serif" style={{ color: theme.startText }}>

                        <div className="text-[10px] font-bold mt-0.5 opacity-80" style={{ color: theme.startText }}>~ {item.endYearStr}</div>

                      {viewMode !== 'year' && (
                        <>
                          <div className="text-[10px] mt-1 font-mono" style={{ color: theme.textSub }}>{t.jewishEra}</div>

                          <div className="text-[10px] mt-2 font-mono" style={{ color: theme.textSub }}>{t.chineseDynasty}</div>

                            <div className="mt-3 flex flex-col gap-1">
                              <div className="text-[10px] font-mono" style={{ color: theme.textSub }}>{t.prophecyProgress}</div>
                              {getProphecyTags(getProphecyN(item.year, item.r)).map((tag, idx) => (
                                <div key={idx} className="text-[9px] font-bold px-1 py-0.5 rounded bg-amber-500/10 text-amber-900 border border-amber-500/30 w-max shadow-sm tracking-tighter max-w-full">
                                  {tag}
                                </div>
                              ))}
                            </div>
                          )}
                        </>
                      )}

                      {viewMode === 'year' && (
                        <>
                          <div className="text-[10px] mt-2 font-mono" style={{ color: theme.textSub }}>{t.dynastySpan}</div>

                             {getDynasty(item.startYear)} 
                             {item.startYear !== item.endYear && getDynasty(item.startYear) !== getDynasty(item.endYear) ? ` ~ ${getDynasty(item.endYear)}` : ''}
                          </div>
                        </>
                      )}
                    </div>
                  </div>

                      </div>

                  {viewMode === 'month' && (
                    <div className="w-28 shrink-0 p-4 pt-6 flex flex-col justify-start" style={{ borderColor: theme.borderMain, backgroundColor: theme.bgCard, borderRightWidth: bWidth, borderStyle: 'solid' }}>

                      <div className="text-[10px] mt-2 opacity-80" style={{ color: theme.textSub }}>{t.monthCount.replace('{n}', item.monthsData.length)}</div>

                    <div className="w-28 shrink-0 p-4 pt-6 flex flex-col justify-start" style={{ borderColor: theme.borderMain, backgroundColor: theme.bgCard, borderRightWidth: bWidth, borderStyle: 'solid' }}>

                      <div className="text-[10px] mt-2 opacity-80" style={{ color: theme.textSub }}>{t.stageCount.replace('{n}', item.chunksData.length)}</div>

                                  <div className="text-[11px] leading-relaxed mb-2" style={{ color: theme.textMain }}>{event.desc}</div>

                      <div className="grid grid-cols-4 md:grid-cols-7 gap-2 w-full mt-2">
                        {item.monthsData.map((m) => {
                          const specificStyle = getHighestStyle(m.events);
                          const hasEv = m.events.length > 0;
                          
                          // 月视图：在每个月块里写入神圣推演标记
                          const pTags = getProphecyTags(getProphecyN(item.year, m.r));

                          return (
                            <div key={m.r} onClick={() => handleZoomToYear(item.year)} className="relative group min-h-[9rem] py-3 px-1 flex flex-col items-center justify-between rounded shadow-sm cursor-pointer transition-all hover:scale-105 hover:z-20 hover:bg-white" style={{ ...specificStyle, borderWidth: hasEv ? (themeBorderWidth*2)+'px' : bWidth, borderStyle: 'solid', opacity: hasEv ? 1 : 0.7 }}>

                               {/* 月视图中的预言进度 - 字体大幅加强 */}
                               {pTags.length > 0 && (
                                 <div className="flex flex-col items-center mt-auto pt-3 w-full gap-[2px]">
                                   {pTags.map((tag, tIdx) => (
                                     <span key={tIdx} className="text-[13px] md:text-[15px] whitespace-nowrap opacity-100 leading-tight font-mono font-bold tracking-tight" style={{ color: theme.startText }}>
                                       {tag}
                                     </span>
                                   ))}
                                 </div>
                               )}
                               
                               {hasEv && (
                                 <div className="absolute bottom-full mb-2 left-1/2 -translate-x-1/2 w-56 p-3 rounded-md shadow-xl opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity z-50 border backdrop-blur-sm hidden group-hover:block" style={{ backgroundColor: theme.bgApp, borderColor: theme.borderMain }}>
                                    <div className="text-xs font-bold mb-1 font-serif" style={{ color: specificStyle.color }}>{item.yearStr} {t.months[m.nameIndex]}</div>

                                 </div>
                               )}
                            </div>
                          )
                        })}
                      </div>

                    {viewMode === 'year' && (
                      <div className="flex items-start justify-center gap-1 md:gap-2 h-full w-full py-4 px-2 mt-2">

                          const hasEv = chunk.events.length > 0;
                          
                          let yearLabel = "";

                             yearLabel = Math.abs(chunk.startYear) + (chunk.startYear < 0 ? "BC" : "");
                          } else {
                             const sY = Math.abs(chunk.startYear);
                             const eY = Math.abs(chunk.endYear);
                             const sEra = chunk.startYear < 0 ? "BC" : "";
                             const eEra = chunk.endYear < 0 ? "BC" : "";
                             yearLabel = sEra === eEra ? `${sY}-${eY}${sEra}` : `${sY}BC-${eY}AD`;
                          }

                          // 年视图的标记渲染在春季对应的年份
                          let nForYearCircle = getProphecyN(chunk.startYear, 1);
                          const pTags = nForYearCircle > 0 ? getProphecyTags(nForYearCircle) : [];

                          return (
                            <div key={cIdx} className="flex-1 flex flex-col items-center justify-start group min-w-[120px] px-1">
                                <div onClick={() => handleZoomToYear(chunk.startYear)} className={`w-full ${yearGroup === 1 ? 'w-10 h-10 md:w-12 md:h-12' : 'h-8 md:h-10'} rounded-full shadow-sm relative cursor-pointer transition-all hover:scale-110 hover:z-20 flex items-center justify-center overflow-visible`} style={{ ...specificStyle, borderWidth: hasEv ? (themeBorderWidth*2)+'px' : bWidth, borderStyle: 'solid', opacity: hasEv ? 1 : 0.5 }}>
                                   <span className="text-[10px] sm:text-xs font-bold whitespace-nowrap px-1 truncate select-none" style={{ color: hasEv ? specificStyle.color : theme.textSub }}>{yearLabel}</span>
                                   
                                   {hasEv && (
                                     <div className="absolute bottom-full mb-3 left-1/2 -translate-x-1/2 w-64 p-3 rounded-md shadow-xl opacity-0 group-hover:opacity-100 pointer-events-none transition-opacity z-50 border backdrop-blur-sm hidden group-hover:block" style={{ backgroundColor: theme.bgApp, borderColor: theme.borderMain }}>
                                        <div className="text-xs font-bold mb-1 font-serif" style={{ color: specificStyle.color }}>{chunk.startYearStr} {chunk.startYear !== chunk.endYear ? `~ ${chunk.endYearStr}` : ''}</div>
                                        {chunk.events.slice(0, 5).map((ev, i) => <div className="text-[10px] leading-tight mb-1" style={{ color: theme.textMain }}>• {ev.title}</div>)}
                                        {chunk.events.length > 5 && <div className="text-[9px] italic" style={{ color: theme.textSub }}>{t.etcRecords.replace('{n}', chunk.events.length)}</div>}
                                     </div>
                                   )}
                                </div>
                                
                                {/* 渲染在圆圈/横杠下方的专属推演标签 - 已放大字体并限制间距 */}
                                {pTags.length > 0 && (
                                  <div className="flex flex-col items-center mt-3 w-full gap-[2px]">
                                    {pTags.map((tag, tIdx) => (
                                      <span key={tIdx} className="text-[13px] md:text-[15px] whitespace-nowrap opacity-100 leading-tight font-mono font-bold tracking-tight" style={{ color: theme.startText }}>
                                        {tag}
                                      </span>
                                    ))}
                                  </div>
                                )}
                            </div>
                          )
                        })}
                      </div>
                    )}

                  </div>

                  {/* 侧边栏：提取当行所有事件摘要，修改为顶部对齐以防止错位 */}
                  <div className="w-64 shrink-0 p-4 pt-6 flex flex-col justify-start overflow-hidden" style={{ borderColor: theme.borderMain, backgroundColor: theme.bgCard, borderLeftWidth: bWidth, borderStyle: 'solid' }}>
                    {viewMode === 'day' && item.monthHasEvent && (
                      <div className="space-y-4">
                        {item.daysData.filter(d => d.event).map((evtData, idx) => {
                          const evtStyle = getEventStyle(evtData.event);
                          return (
                            <div key={idx} className="pl-2.5 relative group" style={{ borderLeftColor: evtStyle.borderColor, borderLeftWidth: Math.max(2, themeBorderWidth)+'px', borderStyle: 'solid' }}>
                              <button onClick={() => openEditor(evtData)} className="absolute -left-6 top-0 opacity-0 group-hover:opacity-100 text-xs bg-white border rounded px-1 shadow-sm text-stone-500 hover:text-amber-600 transition-opacity" style={{ borderWidth: bWidth }}>✏️</button>
                              <div className="flex items-baseline gap-1.5 mb-1">
                                <span className="text-[10px] px-1 rounded shadow-sm font-mono" style={{ backgroundColor: theme.bgApp, color: theme.textSub, borderColor: theme.borderMain, borderWidth: bWidth, borderStyle: 'solid' }}>{evtData.gregMonth}/{evtData.gregDay}({t.weekdays[evtData.dowIdx]})</span>
                                <span className="text-xs font-bold font-serif" style={{ color: evtStyle.color }}>{evtData.event.title}</span>
                              </div>
                              <div className="text-[10px] line-clamp-2 leading-tight mb-1.5" title={evtData.event.desc} style={{ color: theme.textSub }}>{evtData.event.desc}</div>
                            </div>
                          )
                        })}
                      </div>
                    )}
                    
                    {viewMode === 'month' && renderSidebarEvents(item.allEvents)}
                    {viewMode === 'year' && renderSidebarEvents(item.allEvents)}
                    {((viewMode === 'day' && !item.monthHasEvent) || (viewMode === 'month' && !item.hasEvent) || (viewMode === 'year' && !item.hasEvent)) && (
                       <div className="text-[10px] text-left italic font-serif" style={{ color: theme.textSub, opacity: 0.6 }}>{t.noRecord}</div>
                    )}
                  </div>

                </div>
              ))}
            </div>
          </div>
          </div>
          
          <style dangerouslySetInnerHTML={{__html: `
            .custom-scrollbar::-webkit-scrollbar { height: 10px; width: 8px; }
            .custom-scrollbar::-webkit-scrollbar-track { background: ${theme.bgApp}; }
            .custom-scrollbar::-webkit-scrollbar-thumb { background: ${theme.borderMain}; border-radius: 4px; }
            .custom-scrollbar::-webkit-scrollbar-thumb:hover { filter: brightness(0.9); }
          `}} />
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<JewishHistoricalEngine />);
  </script>
</body>
</html>
